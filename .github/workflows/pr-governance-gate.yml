name: pr-governance-gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  pr-governance-gate:
    name: pr-governance-gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR governance
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.payload.review?.pull_request;
            if (!pr) {
              core.setFailed("No pull request context available");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const isReviewEvent = context.eventName === "pull_request_review";

            const { data: fullPr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const problems = [];
            const body = fullPr.body || "";
            const labels = new Set((fullPr.labels || []).map((label) => label.name));
            const billingException = labels.has("ci-billing-exception");

            if (fullPr.draft) {
              problems.push("Draft PRs cannot satisfy governance gate");
            }

            const requiredSections = [
              "## Summary",
              "## Stack Topology",
              "## Validation",
              "## Governance",
              "## CI Exception",
            ];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                problems.push(`Missing PR body section: ${section}`);
              }
            }

            const branchName = fullPr.head.ref || "";
            const layeredBranch = /^(stack|layer|preview|feat|fix|chore|refactor|docs|ci|test)\//.test(branchName);
            if (!layeredBranch) {
              problems.push(`Head branch must use an approved prefix, got '${branchName}'`);
            }

            const directToMain = ["main", "master"].includes(fullPr.base.ref) && /^(feat|fix|chore|refactor|docs|ci|test)\//.test(branchName);
            const hasDirectMainRationale =
              /## Stack Topology[\s\S]*Base branch rationale:\s*(?!\s*(?:-|n\/a|none)?\s*(?:\r?\n|$))/i.test(body) ||
              /direct(?:-| )to(?:-| )main/i.test(body);
            if (directToMain && !hasDirectMainRationale) {
              problems.push(
                "Direct PRs to protected branches require a documented base branch rationale in the PR body"
              );
            }

            if (isReviewEvent && context.payload.review?.state === "changes_requested") {
              problems.push("CHANGES_REQUESTED review is outstanding");
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });
            if (reviews.some((review) => review.state === "CHANGES_REQUESTED")) {
              problems.push("At least one CHANGES_REQUESTED review remains open");
            }

            const threadData = await github.graphql(
              `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                          isOutdated
                        }
                      }
                    }
                  }
                }
              `,
              { owner, repo, number: prNumber }
            );
            const unresolvedThreads =
              threadData.repository?.pullRequest?.reviewThreads?.nodes?.filter(
                (thread) => !thread.isResolved && !thread.isOutdated
              ) || [];
            if (unresolvedThreads.length > 0) {
              problems.push(`Review threads remain unresolved: ${unresolvedThreads.length}`);
            }

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: fullPr.head.sha,
              per_page: 100,
            });

            const blockedChecks = [];
            for (const run of checkRuns.check_runs || []) {
              const name = run.name || "";
              if (name === "PR Governance Gate") {
                continue;
              }
              if (billingException && /billing/i.test(name)) {
                continue;
              }
              const status = run.status;
              const conclusion = run.conclusion;
              if (status !== "completed" || !["success", "neutral", "skipped"].includes(conclusion)) {
                blockedChecks.push(name || run.id);
              }
            }

            if (billingException && !/billing/i.test(body)) {
              problems.push("Billing exception label requires a billing-specific PR body note");
            }

            if (billingException && blockedChecks.length === 0) {
              core.notice("Billing exception label present and non-billing checks are green");
            }

            if (blockedChecks.length > 0) {
              problems.push(`Blocking checks: ${blockedChecks.join(", ")}`);
            }

            if (problems.length > 0) {
              core.setFailed(problems.join("\n"));
            } else {
              core.summary
                .addHeading("PR Governance Gate")
                .addRaw("Governance checks passed.")
                .write();
            }
