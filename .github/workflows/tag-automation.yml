name: Tag Automation

permissions:
  contents: read
on:
  push:
    tags:
      - 'v*'
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Create release tag
        run: echo "Creating release for ${{ github.ref_name }}"
